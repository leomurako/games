        function drawStageSelectScreen() {
            drawStageBackground(selectedStage);

            ctx.save();
            drawText("ステージを選択", WIDTH/2, 70, "bold 32px 'VT323', monospace", '#ffffff', 'center');

            const btnW = 64;
            const btnH = 64;
            const startX = WIDTH/2 - (5 * btnW + 4 * 20) / 2;
            const btnY = HEIGHT/2 - 40;

            for (let i = 1; i <= 5; i++) {
                const bX = startX + (i - 1) * (btnW + 20);
                const isSelected = selectedStage === i;
                const isHovered = hoveredStageButton === i;

                ctx.fillStyle = isHovered || isSelected ? '#2c1e3d' : '#11141a';
                ctx.strokeStyle = isSelected ? '#ffdf00' : (isHovered ? '#a855f7' : '#30363d');
                ctx.lineWidth = isSelected ? 4 : 2;
                ctx.fillRect(bX, btnY, btnW, btnH);
                ctx.strokeRect(bX, btnY, btnW, btnH);

                const textColor = isSelected ? '#ffdf00' : (isHovered ? '#e9d5ff' : '#64748b');
                drawText(`${i}`, bX + btnW/2, btnY + 12, "bold 40px 'VT323', monospace", textColor, 'center');
            }

            drawText(`Stage ${selectedStage}: ${stageConfigs[selectedStage].name}`, WIDTH/2, btnY + 90, "bold 26px 'VT323', monospace", '#ffdf00', 'center');

            const playX = WIDTH/2 - 120;
            const playY = HEIGHT - 90;
            const playW = 240;
            const playH = 48;

            const isPlayHover = mouseX >= playX && mouseX <= playX + playW && mouseY >= playY && mouseY <= playY + playH;
            ctx.fillStyle = isPlayHover ? '#2d1f3d' : '#14111a';
            ctx.strokeStyle = isPlayHover ? '#a855f7' : '#4a3b5c';
            ctx.lineWidth = 3;
            ctx.fillRect(playX, playY, playW, playH);
            ctx.strokeRect(playX, playY, playW, playH);

            const gpColor = isPlayHover ? '#ffffff' : '#a855f7';
            drawText("Game Start", WIDTH/2, playY + 10, "bold 32px 'VT323', monospace", gpColor, 'center');
            ctx.restore();
        }

        // --- メイン描画ループ ---
        function loop() {
            updateGame();

            let offsetX = 0, offsetY = 0;
            if (shakeIntensity > 0.1 && gameState === G_PLAY) {
                offsetX = (Math.random() - 0.5) * shakeIntensity;
                offsetY = (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= shakeDecay;
            } else {
                shakeIntensity = 0;
            }
            container.style.transform = `translate(${offsetX * 2}px, ${offsetY * 2}px)`;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            if (gameState === G_TITLE) {
                drawTitleScreen();
            } else if (gameState === G_STAGE_SELECT) {
                drawStageSelectScreen();
            } else if (gameState === G_PLAY) {
                drawStageBackground();
                drawTree();

                enemies.forEach(enemy => enemy.draw());
                leaves.forEach(leaf => leaf.draw());
                iceShards.forEach(shard => shard.draw());
                coinsList.forEach(coin => coin.draw());
                textParticles.forEach(txt => txt.draw());
                boostParticles.forEach(bp => bp.draw());

                drawLightning();
                drawMiniLightning();

                drawUI();
            }

            if (gameState !== G_PLAY) {
                leaves.forEach(leaf => leaf.draw());
            }

            requestAnimationFrame(loop);
        }

        // --- キーボード入力監視 ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (gameState === G_PLAY && e.code === 'Space') {
                e.preventDefault();
                castSpecialLightning();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // --- マウス・座標取得 (1:1フィッティング) ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: ((e.clientX - rect.left) / rect.width) * canvas.width,
                y: ((e.clientY - rect.top) / rect.height) * canvas.height
            };
        }

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            mouseX = pos.x;
            mouseY = pos.y;

            hoveredButton = null;
            hoveredShopItem = null;

            if (gameState === G_PLAY) {
                if (isGameOver || isAllClear) return;

                if (shopSlide > 0.9) {
                    const sX = WIDTH - shopWidth;
                    for (let item of shopItems) {
                        const absX = sX + 20;
                        if (mouseX >= absX && mouseX <= absX + item.w &&
                            mouseY >= item.y && mouseY <= item.y + item.h) {
                            hoveredShopItem = item;
                            break;
                        }
                    }
                }

                if (!hoveredShopItem && shopSlide < 0.1) { 
                    for (let btn of buttons) {
                        if (mouseX >= btn.x && mouseX <= btn.x + btn.w &&
                            mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                            hoveredButton = btn;
                            break;
                        }
                    }
                }
            } 
            else if (gameState === G_STAGE_SELECT) {
                const btnW = 64;
                const btnH = 64;
                const startX = WIDTH/2 - (5 * btnW + 4 * 20) / 2;
                const btnY = HEIGHT/2 - 40;

                let foundHover = false;
                for (let i = 1; i <= 5; i++) {
                    const bX = startX + (i - 1) * (btnW + 20);
                    if (mouseX >= bX && mouseX <= bX + btnW && mouseY >= btnY && mouseY <= btnY + btnH) {
                        hoveredStageButton = i;
                        foundHover = true;
                        break;
                    }
                }
                if (!foundHover) hoveredStageButton = null; 
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);

            if (gameState === G_TITLE) {
                const btnX = WIDTH/2 - 100;
                const btnY = HEIGHT/2 + 40;
                if (pos.x >= btnX && pos.x <= btnX + 200 && pos.y >= btnY && pos.y <= btnY + 52) {
                    gameState = G_STAGE_SELECT;
                    hoveredStageButton = null;
                }
            } 
            else if (gameState === G_STAGE_SELECT) {
                const btnW = 64;
                const btnH = 64;
                const startX = WIDTH/2 - (5 * btnW + 4 * 20) / 2;
                const btnY = HEIGHT/2 - 40;

                for (let i = 1; i <= 5; i++) {
                    const bX = startX + (i - 1) * (btnW + 20);
                    if (pos.x >= bX && pos.x <= bX + btnW && pos.y >= btnY && pos.y <= btnY + btnH) {
                        selectedStage = i;
                        currentStage = i;
                    }
                }

                const playX = WIDTH/2 - 120;
                const playY = HEIGHT - 90;
                if (pos.x >= playX && pos.x <= playX + 240 && pos.y >= playY && pos.y <= playY + 48) {
                    gameState = G_PLAY;
                    stageSpawnLeft = stageConfigs[currentStage].totalEnemies;
                    stageDefeatedCount = 0;
                    enemies = [];
                    coinsList = [];
                    targetCameraX = 0;
                    cameraOffsetY = 0; 
                    targetCameraY = 0; 
                    cameraY = 0;       
                    leaves = Array.from({ length: 80 }, () => new LeafParticle(true));
                }
            } 
            else if (gameState === G_PLAY) {
                if (isGameOver) {
                    isGameOver = false;
                    treeHp = maxTreeHp;
                    enemies = [];
                    coinsList = [];
                    stageSpawnLeft = stageConfigs[currentStage].totalEnemies;
                    spawnTimer = 0;
                    return;
                }

                if (isAllClear) {
                    isAllClear = false;
                    gameState = G_TITLE;
                    return;
                }

                if (pos.x >= 16 && pos.x <= 206 && pos.y >= 90 && pos.y <= 126) {
                    castSpecialLightning();
                    return;
                }

                if (shopSlide > 0.9 && hoveredShopItem) {
                    buyShopItem(hoveredShopItem);
                    return;
                }

                if (hoveredButton && shopSlide < 0.1) {
                    buyNormalUpgrade(hoveredButton);
                    return;
                }

                const isClickInShopArea = shopSlide > 0 && pos.x >= WIDTH - shopWidth * shopSlide;
                if (pos.y < GROUND_Y && !isClickInShopArea) {
                    triggerLightning();
                }
            }
        });

        loop();
	</script>
</body>
