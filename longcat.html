<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Longcat Retro Puzzle</title>
<!-- ドット絵風の日本語対応フォント -->
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
 body {
   margin: 0;
   padding: 0;
   background-color: #1a1a1a;
   font-family: 'DotGothic16', sans-serif;
   color: #fff;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   min-height: 100vh;
   touch-action: none;
   overflow: hidden;
   user-select: none;
 }
 h1 {
   color: #fff;
   margin: 5px 0 15px 0;
   font-size: 28px;
   letter-spacing: 2px;
   text-shadow: 2px 2px 0 #000;
 }
 #level-info {
   color: #ddd;
   font-size: 18px;
   margin-bottom: 15px;
   background: #333;
   padding: 5px 15px;
   border: 2px solid #555;
   box-shadow: 2px 2px 0 #000;
 }
 #game-container {
   position: relative;
   border: 6px solid #555;
   border-bottom-color: #222;
   border-right-color: #222;
   background-color: #111;
   padding: 4px;
   box-shadow: 4px 4px 0 #000;
   display: inline-block;
 }
 canvas {
   background-color: #111;
   display: block;
   image-rendering: pixelated; /* ドットをくっきりさせる */
 }
 .controls {
   margin-top: 20px;
   display: flex;
   gap: 15px;
 }
 button {
   font-family: 'DotGothic16', sans-serif;
   padding: 10px 20px;
   font-size: 16px;
   background-color: #444;
   color: #fff;
   border: 4px solid #aaa;
   border-bottom-color: #222;
   border-right-color: #222;
   cursor: pointer;
   box-shadow: 2px 2px 0 #000;
 }
 button:active {
   border-top-color: #222;
   border-left-color: #222;
   border-bottom-color: #aaa;
   border-right-color: #aaa;
   transform: translate(2px, 2px);
   box-shadow: none;
 }
 #ui-overlay {
   position: absolute;
   top: 0; left: 0; right: 0; bottom: 0;
   background: rgba(0,0,0,0.75);
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   visibility: hidden;
   opacity: 0;
   transition: opacity 0.2s;
   z-index: 10;
 }
 #ui-overlay h2 {
   font-size: 32px;
   color: #ffcc00;
   text-shadow: 3px 3px 0 #cc0000;
   margin-bottom: 25px;
 }
 #next-btn {
   background-color: #ffcc00;
   color: #000;
   font-weight: bold;
   border: 4px solid #fff;
   border-bottom-color: #aa7700;
   border-right-color: #aa7700;
 }
 #next-btn:active {
   border-top-color: #aa7700;
   border-left-color: #aa7700;
 }
 #d-pad {
   display: none;
   grid-template-columns: repeat(3, 60px);
   grid-template-rows: repeat(3, 60px);
   gap: 5px;
   margin-top: 20px;
 }
 .d-btn {
   background: #555;
   border: 4px solid #aaa;
   border-bottom-color: #222;
   border-right-color: #222;
   display: flex;
   align-items: center;
   justify-content: center;
   font-size: 24px;
   color: #fff;
   cursor: pointer;
 }
 .d-btn:active {
   border-top-color: #222;
   border-left-color: #222;
   border-bottom-color: #aaa;
   border-right-color: #aaa;
 }
 .d-up { grid-column: 2; grid-row: 1; }
 .d-left { grid-column: 1; grid-row: 2; }
 .d-right { grid-column: 3; grid-row: 2; }
 .d-down { grid-column: 2; grid-row: 3; }
 @media (max-width: 600px) {
   #d-pad { display: grid; }
   h1 { font-size: 24px; margin: 5px 0 10px 0; }
 }
</style>
</head>
<body>


<h1>LONGCAT PUZZLE</h1>
<div id="level-info">STAGE 1 / 30</div>


<div id="game-container">
 <canvas id="gameCanvas"></canvas>
 <div id="ui-overlay">
   <h2 id="overlay-msg">STAGE CLEAR!</h2>
   <button id="next-btn" onclick="nextLevel()">NEXT STAGE</button>
 </div>
</div>


<div class="controls">
 <button onclick="restartLevel()">RETRY</button>
 <button onclick="undoMove()">UNDO</button>
</div>


<div id="d-pad">
 <div class="d-btn d-up" onclick="triggerMove(0, -1)">▲</div>
 <div class="d-btn d-left" onclick="triggerMove(-1, 0)">◀</div>
 <div class="d-btn d-right" onclick="triggerMove(1, 0)">▶</div>
 <div class="d-btn d-down" onclick="triggerMove(0, 1)">▼</div>

// --- ゲーム状態管理 ---
let currentLevel = 0;
let grid = [], rows = 0, cols = 0, floorCount = 0;
let catPath = [], moveHistory = [];
let head = {x: 0, y: 0}, headPixel = {x: 0, y: 0};
let isMoving = false, moveDir = {dx: 0, dy: 1}, queuedMove = null;
let state = 'PLAYING'; // PLAYING, WON, DONE
let particles = [];
let TILE_SIZE = 32;
let speed = 8; // 移動速度


const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');


function loadLevel(idx) {
   if (idx >= LEVELS.length) {
       state = 'DONE';
       document.getElementById('ui-overlay').style.visibility = 'visible';
       document.getElementById('ui-overlay').style.opacity = '1';
       document.getElementById('overlay-msg').innerText = 'ALL CLEARED!';
       document.getElementById('next-btn').style.display = 'none';
       return;
   }
   currentLevel = idx;
   document.getElementById('level-info').innerText = `STAGE ${idx + 1} / ${LEVELS.length}`;
  
   let levelData = LEVELS[idx];
   rows = levelData.length;
   cols = Math.max(...levelData.map(r => r.length));
   grid = []; floorCount = 0; particles = [];


   let startPos = {x: 0, y: 0};
   for (let y = 0; y < rows; y++) {
       let row = [];
       for (let x = 0; x < cols; x++) {
           let char = levelData[y][x] || ' ';
           row.push(char);
           if (char === '.' || char === 'S') floorCount++;
           if (char === 'S') startPos = {x, y};
       }
       grid.push(row);
   }


   catPath = [{x: startPos.x, y: startPos.y}];
   head = {x: startPos.x, y: startPos.y};
   moveHistory = [];
   isMoving = false; moveDir = {dx: 0, dy: 1}; queuedMove = null;
   state = 'PLAYING';
   document.getElementById('ui-overlay').style.visibility = 'hidden';
   document.getElementById('ui-overlay').style.opacity = '0';
  
   resizeCanvas();
   headPixel = {x: head.x * TILE_SIZE, y: head.y * TILE_SIZE};
}


function resizeCanvas() {
   let maxW = Math.min(500, window.innerWidth * 0.9);
   // TILE_SIZEを整数にしてドットの崩れを防ぐ
   TILE_SIZE = Math.max(16, Math.floor(maxW / Math.max(cols, rows)));
   speed = Math.max(4, Math.floor(TILE_SIZE / 3));
   canvas.width = cols * TILE_SIZE;
   canvas.height = rows * TILE_SIZE;
   if(!isMoving) headPixel = {x: head.x * TILE_SIZE, y: head.y * TILE_SIZE};
}
window.addEventListener('resize', resizeCanvas);


// --- 判定ロジック ---
function isValid(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }
function isSolid(x, y) {
   if (!isValid(x, y)) return true;
   if (grid[y][x] === '#') return true;
   for (let p of catPath) {
       if (p.x === x && p.y === y) return true;
   }
   return false;
}


// --- 移動ロジック ---
function triggerMove(dx, dy) {
   if (state !== 'PLAYING') return;
   if (isMoving) { queuedMove = {dx, dy}; return; }


   let nx = head.x + dx, ny = head.y + dy;
   if (isSolid(nx, ny)) return; // 最初から壁や体なら動けない


   moveHistory.push(catPath.length);
   isMoving = true;
   moveDir = {dx, dy};
   head = {x: nx, y: ny}; // 次のターゲット座標をセット
}


function undoMove() {
   if (state !== 'PLAYING' || moveHistory.length === 0) return;
   isMoving = false; queuedMove = null;
   let prevLength = moveHistory.pop();
   catPath = catPath.slice(0, prevLength);
   head = {x: catPath[catPath.length - 1].x, y: catPath[catPath.length - 1].y};
   headPixel = {x: head.x * TILE_SIZE, y: head.y * TILE_SIZE};
}


function restartLevel() { loadLevel(currentLevel); }
function nextLevel() { loadLevel(currentLevel + 1); }


// --- エフェクト ---
function spawnParticles(px, py, dir, isWallHit) {
   let count = isWallHit ? 12 : 2;
   for(let i=0; i<count; i++) {
       particles.push({
           x: px, y: py,
           vx: (Math.random() - 0.5) * 8 - dir.dx * 3,
           vy: (Math.random() - 0.5) * 8 - dir.dy * 3,
           life: 1.0, decay: Math.random() * 0.05 + 0.02,
           size: Math.floor(Math.random() * (TILE_SIZE/6)) + 2,
           color: isWallHit ? (Math.random() > 0.5 ? '#888' : '#fff') : '#ddd'
       });
   }
}


// --- メインループ ---
function update() {
   if (state === 'WON' && Math.random() < 0.1) {
       // クリア時の紙吹雪
       spawnParticles(Math.random() * canvas.width, Math.random() * canvas.height, {dx:0, dy:0}, true);
   }


   if (state === 'PLAYING' && isMoving) {
       headPixel.x += moveDir.dx * speed;
       headPixel.y += moveDir.dy * speed;


       let targetPx = head.x * TILE_SIZE;
       let targetPy = head.y * TILE_SIZE;


       let reachedX = (moveDir.dx > 0 && headPixel.x >= targetPx) || (moveDir.dx < 0 && headPixel.x <= targetPx) || moveDir.dx === 0;
       let reachedY = (moveDir.dy > 0 && headPixel.y >= targetPy) || (moveDir.dy < 0 && headPixel.y <= targetPy) || moveDir.dy === 0;


       if (reachedX && reachedY) {
           headPixel.x = targetPx; headPixel.y = targetPy;
          
           // パスに追加
           if (catPath.length === 0 || catPath[catPath.length-1].x !== head.x || catPath[catPath.length-1].y !== head.y) {
               catPath.push({x: head.x, y: head.y});
           }


           let nx = head.x + moveDir.dx, ny = head.y + moveDir.dy;


           if (!isSolid(nx, ny)) {
               // 進み続ける
               head = {x: nx, y: ny};
               if (Math.random() > 0.3) spawnParticles(headPixel.x + TILE_SIZE/2, headPixel.y + TILE_SIZE/2, moveDir, false);
           } else {
               // 壁・体に激突して停止
               isMoving = false;
               spawnParticles(headPixel.x + TILE_SIZE/2 + moveDir.dx*TILE_SIZE/2, headPixel.y + TILE_SIZE/2 + moveDir.dy*TILE_SIZE/2, moveDir, true);
              
               // クリア判定
               if (catPath.length === floorCount) {
                   state = 'WON';
                   document.getElementById('ui-overlay').style.visibility = 'visible';
                   document.getElementById('ui-overlay').style.opacity = '1';
               } else if (queuedMove) {
                   let q = queuedMove; queuedMove = null;
                   triggerMove(q.dx, q.dy);
               }
           }
       }
   }


   // パーティクルの更新
   for (let i = particles.length - 1; i >= 0; i--) {
       let p = particles[i];
       p.x += p.vx; p.y += p.vy; p.life -= p.decay;
       if (p.life <= 0) particles.splice(i, 1);
   }
}


function draw() {
   ctx.fillStyle = '#111';
   ctx.fillRect(0, 0, canvas.width, canvas.height);


   // 壁と床
   for (let y = 0; y < rows; y++) {
       for (let x = 0; x < cols; x++) {
           let px = x * TILE_SIZE, py = y * TILE_SIZE;
           if (grid[y][x] === '.' || grid[y][x] === 'S') {
               ctx.fillStyle = '#3a3a3a';
               ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
               ctx.fillStyle = '#222'; // 床の模様
               ctx.fillRect(px + TILE_SIZE/2 - 2, py + TILE_SIZE/2 - 2, 4, 4);
           } else if (grid[y][x] === '#') {
               ctx.fillStyle = '#666';
               ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
               ctx.fillStyle = '#888'; // ハイライト
               ctx.fillRect(px, py, TILE_SIZE, 4);
               ctx.fillRect(px, py, 4, TILE_SIZE);
               ctx.fillStyle = '#333'; // シャドウ
               ctx.fillRect(px, py + TILE_SIZE - 4, TILE_SIZE, 4);
               ctx.fillRect(px + TILE_SIZE - 4, py, 4, TILE_SIZE);
           }
       }
   }


   // 猫の描画（ドット風、四角形ベース）
   if (catPath.length > 0) {
       let segments = [];
       for (let i = 1; i < catPath.length; i++) {
           segments.push({ p1: catPath[i-1], p2: catPath[i] });
       }


       // 黒フチ描画
       ctx.fillStyle = '#000';
       catPath.forEach(p => ctx.fillRect(p.x * TILE_SIZE + 1, p.y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2));
       segments.forEach(seg => {
           let x = Math.min(seg.p1.x, seg.p2.x) * TILE_SIZE + 1;
           let y = Math.min(seg.p1.y, seg.p2.y) * TILE_SIZE + 1;
           let w = seg.p1.x !== seg.p2.x ? TILE_SIZE * 2 - 2 : TILE_SIZE - 2;
           let h = seg.p1.y !== seg.p2.y ? TILE_SIZE * 2 - 2 : TILE_SIZE - 2;
           ctx.fillRect(x, y, w, h);
       });


       // 移動中の頭と尻尾の間の黒フチ
       if (isMoving) {
           let tail = catPath[catPath.length - 1];
           let hx = headPixel.x + 1, hy = headPixel.y + 1;
           let tx = tail.x * TILE_SIZE + 1, ty = tail.y * TILE_SIZE + 1;
           let x = Math.min(hx, tx), y = Math.min(hy, ty);
           let w = hx !== tx ? Math.abs(hx - tx) + TILE_SIZE - 2 : TILE_SIZE - 2;
           let h = hy !== ty ? Math.abs(hy - ty) + TILE_SIZE - 2 : TILE_SIZE - 2;
           ctx.fillRect(x, y, w, h);
       }


       // 白い中身描画
       ctx.fillStyle = '#fff';
       catPath.forEach(p => ctx.fillRect(p.x * TILE_SIZE + 4, p.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8));
       segments.forEach(seg => {
           let x = Math.min(seg.p1.x, seg.p2.x) * TILE_SIZE + 4;
           let y = Math.min(seg.p1.y, seg.p2.y) * TILE_SIZE + 4;
           let w = seg.p1.x !== seg.p2.x ? TILE_SIZE * 2 - 8 : TILE_SIZE - 8;
           let h = seg.p1.y !== seg.p2.y ? TILE_SIZE * 2 - 8 : TILE_SIZE - 8;
           ctx.fillRect(x, y, w, h);
       });


       let currentHeadX = catPath[catPath.length - 1].x * TILE_SIZE;
       let currentHeadY = catPath[catPath.length - 1].y * TILE_SIZE;


       // 移動中の頭の中身
       if (isMoving) {
           let tail = catPath[catPath.length - 1];
           let hx = headPixel.x + 4, hy = headPixel.y + 4;
           let tx = tail.x * TILE_SIZE + 4, ty = tail.y * TILE_SIZE + 4;
           let x = Math.min(hx, tx), y = Math.min(hy, ty);
           let w = hx !== tx ? Math.abs(hx - tx) + TILE_SIZE - 8 : TILE_SIZE - 8;
           let h = hy !== ty ? Math.abs(hy - ty) + TILE_SIZE - 8 : TILE_SIZE - 8;
           ctx.fillRect(x, y, w, h);
           currentHeadX = headPixel.x;
           currentHeadY = headPixel.y;
       }


       // ドット絵風の顔 (目と口を四角で描画)
       ctx.fillStyle = '#000';
       let eye = Math.max(3, Math.floor(TILE_SIZE * 0.12));
       let cx = currentHeadX + TILE_SIZE / 2;
       let cy = currentHeadY + TILE_SIZE / 2;


       if (moveDir.dx === 1) {
           ctx.fillRect(cx + TILE_SIZE*0.1, cy - TILE_SIZE*0.25, eye, eye);
           ctx.fillRect(cx + TILE_SIZE*0.1, cy + TILE_SIZE*0.15, eye, eye);
           ctx.fillRect(cx + TILE_SIZE*0.3, cy - eye/2, eye, eye);
       } else if (moveDir.dx === -1) {
           ctx.fillRect(cx - TILE_SIZE*0.1 - eye, cy - TILE_SIZE*0.25, eye, eye);
           ctx.fillRect(cx - TILE_SIZE*0.1 - eye, cy + TILE_SIZE*0.15, eye, eye);
           ctx.fillRect(cx - TILE_SIZE*0.3 - eye, cy - eye/2, eye, eye);
       } else if (moveDir.dy === -1) {
           ctx.fillRect(cx - TILE_SIZE*0.25, cy - TILE_SIZE*0.1 - eye, eye, eye);
           ctx.fillRect(cx + TILE_SIZE*0.15, cy - TILE_SIZE*0.1 - eye, eye, eye);
           ctx.fillRect(cx - eye/2, cy - TILE_SIZE*0.3 - eye, eye, eye);
       } else {
           ctx.fillRect(cx - TILE_SIZE*0.25, cy + TILE_SIZE*0.1, eye, eye);
           ctx.fillRect(cx + TILE_SIZE*0.15, cy + TILE_SIZE*0.1, eye, eye);
           ctx.fillRect(cx - eye/2, cy + TILE_SIZE*0.3, eye, eye);
       }
   }


   // パーティクルの描画
   particles.forEach(p => {
       ctx.fillStyle = p.color;
       ctx.globalAlpha = p.life;
       ctx.fillRect(p.x, p.y, p.size, p.size);
   });
   ctx.globalAlpha = 1.0;
}


function gameLoop() {
   update();
   draw();
   requestAnimationFrame(gameLoop);
}


// --- 入力制御 ---
window.addEventListener('keydown', e => {
   if (state !== 'PLAYING') return;
   switch(e.key) {
       case 'ArrowUp': case 'w': triggerMove(0, -1); break;
       case 'ArrowDown': case 's': triggerMove(0, 1); break;
       case 'ArrowLeft': case 'a': triggerMove(-1, 0); break;
       case 'ArrowRight': case 'd': triggerMove(1, 0); break;
   }
});


let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
   e.preventDefault();
   touchStartX = e.changedTouches[0].screenX;
   touchStartY = e.changedTouches[0].screenY;
}, {passive: false});


canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
canvas.addEventListener('touchend', e => {
   e.preventDefault();
   let dx = e.changedTouches[0].screenX - touchStartX;
   let dy = e.changedTouches[0].screenY - touchStartY;
   if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) triggerMove(dx > 0 ? 1 : -1, 0);
   else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) triggerMove(0, dy > 0 ? 1 : -1);
}, {passive: false});


// 起動処理
window.onload = () => {
   loadLevel(0);
   requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>
