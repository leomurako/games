<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro & Arcade Game Hub</title>
    <!-- Tailwind CSS を使ってすっきりしたデザインにします -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* iframeのスクロールバーやボーダーを調整 */
        iframe {
            border: none;
            background: #000;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- サイドバー / メニューエリア -->
    <aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col shrink-0">
        <!-- ロゴ・タイトル -->
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold tracking-wider text-cyan-400">GAME HUB</h1>
            <p class="text-xs text-slate-400 mt-1">Retro & Arcade Collection</p>
        </div>

        <!-- ゲームリストボタン -->
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="loadGame('slot.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 bg-slate-800 border border-cyan-500/30 text-cyan-400">
                <span>🎰</span> <span class="font-medium">NEO SLOTS</span>
            </button>
            <button onclick="loadGame('longcat.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>🐱</span> <span class="font-medium">LONGCAT PUZZLE</span>
            </button>
            <button onclick="loadGame('suika.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>🍉</span> <span class="font-medium">PLANET DROP</span>
            </button>
            <button onclick="loadGame('traffic.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>🚗</span> <span class="font-medium">TRAFFIC ESCAPE</span>
            </button>
            <button onclick="loadGame('sputnika.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>🚀</span> <span class="font-medium">SPUTNIKA GAME</span>
            </button>
            <button onclick="loadGame('paper.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>📄</span> <span class="font-medium">PAPER.IO CLONE</span>
            </button>
            <button onclick="loadGame('stack.html', this)" class="game-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-3 text-slate-300">
                <span>🧱</span> <span class="font-medium">LUMINA DROP (STACK)</span>
            </button>
        </nav>

        <!-- フッター情報 -->
        <div class="p-4 border-t border-slate-800 text-center text-xs text-slate-500">
            &copy; 2026 Arcade Hub
        </div>
    </aside>

    <!-- メインコンテンツエリア (iframe) -->
    <main class="flex-1 flex flex-col relative bg-black">
        <!-- フルスクリーン表示用のコンテナ -->
        <div class="flex-1 w-full h-full relative">
            <iframe id="game-frame" src="slot.html" class="absolute inset-0 w-full h-full" allow="autoplay"></iframe>
        </div>
    </main>

    <script>
        function loadGame(url, buttonEl) {
            // iframeのsrcを切り替えてゲームを読み込む
            const frame = document.getElementById('game-frame');
            frame.src = url;

            // ボタンのアクティブ状態の見た目を更新
            const buttons = document.querySelectorAll('.game-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-slate-800', 'border', 'border-cyan-500/30', 'text-cyan-400');
                btn.classList.add('text-slate-300');
            });

            buttonEl.classList.remove('text-slate-300');
            buttonEl.classList.add('bg-slate-800', 'border', 'border-cyan-500/30', 'text-cyan-400');
        }
    </script>
</body>
</html>
